<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header><h1>Analisador de Números</h1></header>
    <main>
      <form>
        <label for="numero">Numero (entre 1 e 100)</label>
        <input
          type="number"
          name="numero"
          id="numero"
          required
          min="1"
          max="100"
        />

        <input type="submit" value="Adicionar"/>
      </form>
      <ul id="lista"></ul>
      <input type="submit" value="Finalizar" id="btnFinalizar" />
      <input type="submit" value="Limpar" id="btnLimpar" />
      <div id="resultado"></div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
