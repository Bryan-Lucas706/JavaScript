<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header> <h1>Vamos Contar</h1></header>
    <main>
        <form>
            <div>
                <label for="inicio">Início:</label>
                <input type="number" name="inicio" id="inicio" required>
            <div>

            <div>
                <label for="fim">Fim:</label>
                <input type="number" name="fim" id="fim" required>
            </div>
            
            <div>
                <label for="passo">Passo:</label>
                <input type="number" name="passo" id="passo" required>
            </div>

            <input type="submit" value="Contar" id="btnContar">
            <input type="reset" value="Limpar">
        </form>

        <p id="resultado">Preparando a contagem...</p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
