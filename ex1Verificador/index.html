<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificador de idade</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Verificador de idade</h1>
    <main>
      <form id="form">
        <div>
          <label for="nascimento">Ano de Nascimento: </label>
          <input type="number" name="nascimento" id="nascimento" />
        </div>

        <div>
          <label for="genero">Gênero:</label>
          <input type="radio" name="genero" id="masculino" checked /> 
          <label for="masculino">Masculino</label>
          <input type="radio" name="genero" id="feminino" />
          <label for="feminino">Feminino</label>
        </div>

        <button type="submit" id="verificar">Verificar</button>
      </form>
      <div id="resposta">
        <p>Preencha os dados para obter o resultado!</p>
      </div>
    </main>
    <footer>&copy; BryanLucas</footer>
    <script src="app.js"></script>
  </body>
</html>
